<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JS Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos personalizados fiéis à sua imagem */
        .navbar-custom {
            background-color: #0b3560; /* Azul escuro da sua foto */
        }
        .btn-sair {
            background-color: #f26122; /* Laranja exato do botão Sair */
            color: white;
            border: none;
        }
        .btn-sair:hover {
            background-color: #d9531e;
            color: white;
        }
        
        /* Estilização dos Módulos (Botões quadrados) */
        .module-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 140px;
            background-color: #fafafa;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .module-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .module-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        .module-text {
            font-size: 0.9rem;
            font-weight: 700;
            color: #9b51e0; /* Roxo da sua foto */
            text-align: center;
        }

        /* Cartão Especial: Gerenciar Equipe */
        .module-card-equipe {
            background-color: #f2a654; /* Laranja claro da sua foto */
            border: none;
        }
        .module-card-equipe .module-text {
            color: white;
        }
    </style>
</head>
<body class="bg-white">

    <nav class="navbar navbar-custom py-3 mb-5">
        <div class="container-fluid px-4">
            <a class="navbar-brand text-white fw-bold fs-4" href="{% url 'Dashboard' %}">JS Mecânica</a>
            <a href="#" class="btn btn-sair fw-bold px-4 rounded-3">Sair</a>
        </div>
    </nav>

    <div class="container text-center mt-5">
        <h1 class="fw-bold text-dark mb-2" style="font-size: 2.5rem;">Olá, junior!</h1>
        <p class="text-secondary mb-5 fs-5">Clicando nesses botões navegue entre os módulos</p>

        <div class="d-flex justify-content-center flex-wrap gap-3">
            
            <a href="{% url 'TelaClientes' %}" class="module-card">
                <span class="module-icon">👥</span>
                <span class="module-text">Clientes</span>
            </a>

            <a href="#" class="module-card">
                <span class="module-icon">🚗</span>
                <span class="module-text">Veículos</span>
            </a>

            <a href="#" class="module-card">
                <span class="module-icon">📋</span>
                <span class="module-text">Ordens de<br>Serviço</span>
            </a>

            <a href="#" class="module-card">
                <span class="module-icon">🛠️</span>
                <span class="module-text">Procedimentos</span>
            </a>

            <a href="#" class="module-card">
                <span class="module-icon">📦</span>
                <span class="module-text">Insumos</span>
            </a>

            <a href="#" class="module-card module-card-equipe">
                <span class="module-icon">⚙️</span>
                <span class="module-text">Gerenciar<br>Equipe</span>
            </a>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
