{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JS Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow border-0">
            <div class="card-header bg-danger text-white fw-bold">⚠️ CONFIRMAÇÃO DE EXCLUSÃO</div>
            <div class="card-body bg-white text-center p-4">
                <p class="fs-5 text-dark">Tem certeza que deseja remover permanentemente o cliente <br><strong class="text-danger">{{ cliente.nome }}</strong>?</p>
                <p class="text-muted small">Esta ação não poderá ser desfeita e removerá seus históricos.</p>
                
                <form method="POST" class="mt-4 d-flex justify-content-center gap-2">
                    {% csrf_token %}
                    <a href="{% url 'TelaClientes' %}" class="btn btn-light fw-bold">Não, Cancelar</a>
                    <button type="submit" class="btn btn-danger fw-bold">Sim, Excluir</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
