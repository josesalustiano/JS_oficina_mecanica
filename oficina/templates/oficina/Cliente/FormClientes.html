{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }} - JS Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow-sm border-0">
            <div class="card-header text-dark fw-bold {% if cliente %}bg-warning{% else %}bg-primary text-white{% endif %}">
                {% if cliente %}✏️{% else %}➕{% endif %} {{ titulo }}
            </div>
            <div class="card-body bg-white p-4">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-3">
                        {% for field in form %}
                            <div class="col-12">
                                <label class="form-label small fw-bold text-secondary">{{ field.label|upper }}</label>
                                {{ field }}
                            </div>
                        {% endfor %}
                    </div>
                    <div class="mt-4 d-flex justify-content-end gap-2">
                        <a href="{% url 'TelaClientes' %}" class="btn btn-light fw-bold">Cancelar</a>
                        <button type="submit" class="btn {% if cliente %}btn-warning{% else %}btn-dark{% endif %} fw-bold">
                            {% if cliente %}Atualizar Registro{% else %}Salvar Cliente{% endif %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
