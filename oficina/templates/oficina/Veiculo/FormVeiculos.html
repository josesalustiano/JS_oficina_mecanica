{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Mecânica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark py-3 px-4" style="background-color: #0b355c;">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1 fw-bold fs-3">JS Mecânica</span>
            <a href="{% url 'TelaVeiculos' %}" class="btn btn-outline-light px-4 py-2 rounded-3">Voltar à Lista</a>
        </div>
    </nav>

    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header text-white fw-bold py-3 fs-5" style="background-color: #0b355c;">
                📂 {{ titulo }}
            </div>
            <div class="card-body bg-white p-4">
                <form method="POST" autocomplete="off">
                    {% csrf_token %}
                    
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold text-secondary mb-1">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}
                                <div class="text-danger small mt-1 fw-medium">{{ field.errors|striptags }}</div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <div class="d-flex justify-content-end gap-2 mt-4 pt-2 border-top">
                        <a href="{% url 'TelaVeiculos' %}" class="btn btn-light fw-bold px-4 py-2 rounded-3 text-secondary">Cancelar</a>
                        <button type="submit" class="btn text-white fw-bold px-4 py-2 rounded-3" style="background-color: #0b355c;">
                            Salvar Dados
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <script>
        $(document).ready(function() {
            $('.select2-search').select2({
                placeholder: "Clique ou digite para buscar...",
                allowClear: true,
                width: '100%',
                language: {
                    noResults: function () {
                        return "Nenhum resultado encontrado.";
                    }
                }
            });
        });
    </script>

</body>
</html>
